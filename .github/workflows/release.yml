name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver release version (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      tag:
        description: "Git tag for the release (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (tag: $TAG)"

  build-linux-android:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync pubspec version
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          BUILD="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f2)"
          sed -i "s/^version:.*/version: ${VERSION}+${BUILD:-1}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            fakeroot ruby ruby-dev rubygems-integration build-essential rpm
          sudo gem install --no-document fpm

      - name: Build Linux, Android, .deb, .rpm
        run: bash tool/build_release.sh "${{ needs.resolve-version.outputs.version }}"

      - name: Upload Linux/Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-android
          path: |
            dist/MindGrid-${{ needs.resolve-version.outputs.version }}-linux-amd64.tar.gz
            dist/MindGrid-${{ needs.resolve-version.outputs.version }}-linux-amd64.deb
            dist/MindGrid-${{ needs.resolve-version.outputs.version }}-linux-amd64.rpm
            dist/MindGrid-${{ needs.resolve-version.outputs.version }}-android.apk

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync pubspec version
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          BUILD="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f2)"
          sed -i "s/^version:.*/version: ${VERSION}+${BUILD:-1}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Create installer
        shell: pwsh
        run: |
          $version = "${{ needs.resolve-version.outputs.version }}"
          $iss = Get-Content tool/windows_installer.iss -Raw
          $iss = $iss -replace '\{\{VERSION\}\}', $version
          Set-Content -Path tool/windows_installer.generated.iss -Value $iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" tool/windows_installer.generated.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/MindGrid-${{ needs.resolve-version.outputs.version }}-windows-setup.exe

  publish-release:
    needs: [resolve-version, build-linux-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p dist
          find artifacts -type f \( \
            -name '*.apk' -o \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.tar.gz' -o \
            -name '*.exe' \
          \) -exec cp {} dist/ \;
          ls -lh dist/

      - name: Generate release notes
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          cat > release-notes.md <<EOF
          ## MindGrid ${VERSION}

          First stable release of MindGrid — local and cloud AI assistant for Ollama and OpenAI-compatible APIs.

          ### Downloads

          | Platform | File | Install |
          |----------|------|---------|
          | Android | \`MindGrid-${VERSION}-android.apk\` | Sideload APK |
          | Windows | \`MindGrid-${VERSION}-windows-setup.exe\` | Run installer |
          | Linux (generic) | \`MindGrid-${VERSION}-linux-amd64.tar.gz\` | Extract and run \`bundle/mindgrid\` |
          | Debian / Ubuntu | \`MindGrid-${VERSION}-linux-amd64.deb\` | \`sudo dpkg -i …\` |
          | Fedora / RHEL | \`MindGrid-${VERSION}-linux-amd64.rpm\` | \`sudo dnf install …\` |

          ### Checksums

          \`\`\`
          $(cd dist && sha256sum MindGrid-${VERSION}-*)
          \`\`\`
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          VERSION="${{ needs.resolve-version.outputs.version }}"

          gh release view "$TAG" 2>/dev/null || \
            gh release create "$TAG" --title "MindGrid $VERSION" --notes-file release-notes.md

          gh release upload "$TAG" dist/MindGrid-"${VERSION}"-* --clobber
