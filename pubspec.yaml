name: mindgrid
description: MindGrid — Ollama Studio for mobile and desktop.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  flutter_markdown: ^0.7.6+2
  markdown: ^7.3.0
  file_picker: ^8.1.7
  cross_file: ^0.3.4+2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  desktop_drop: ^0.5.0
  url_launcher: ^6.3.1
  record: ^6.2.1
  permission_handler: ^11.4.0
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  web:
    generate: true
    image_path: assets/images/app_icon.png
  windows:
    generate: true
    image_path: assets/images/app_icon.png
  macos:
    generate: true
    image_path: assets/images/app_icon.png
  linux:
    generate: true
    image_path: assets/images/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.jpg
